services:
  db:
    image: postgres:16
    container_name: fridge9000-db
    environment:
      POSTGRES_USER: fridge
      POSTGRES_PASSWORD: fridgepass
      POSTGRES_DB: fridge9000
    ports:
      - "5432:5432"
    volumes:
      - fridge9000_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fridge -d fridge9000"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: fridge9000-backend
    environment:
      DATABASE_URL: postgresql://fridge:fridgepass@db:5432/fridge9000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    image: node:20-alpine
    container_name: fridge9000-frontend
    working_dir: /app
    command: sh -c "if [ ! -d node_modules ] || [ ! -f node_modules/.package-lock-hash ] || [ \"$(sha1sum package-lock.json | awk '{print $1}')\" != \"$(cat node_modules/.package-lock-hash 2>/dev/null)\" ]; then npm install && sha1sum package-lock.json | awk '{print $1}' > node_modules/.package-lock-hash; fi && npx expo start --tunnel"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
    volumes:
      - ./mobile:/app
      - mobile_node_modules:/app/node_modules
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  fridge9000_pgdata:
  mobile_node_modules: