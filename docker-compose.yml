services:
  db:
    image: postgres:16
    container_name: fridge9000-db
    environment:
      POSTGRES_USER: fridge
      POSTGRES_PASSWORD: fridgepass
      POSTGRES_DB: fridge9000
    ports:
      - "5432:5432"
    volumes:
      - fridge9000_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fridge -d fridge9000"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: fridge9000-backend
    environment:
      DATABASE_URL: postgresql://fridge:fridgepass@db:5432/fridge9000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # אופציונלי: מאפשר לשמור uploads גם מחוץ לקונטיינר (לבדיקות)
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: fridge9000-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  fridge9000_pgdata:
